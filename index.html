<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>血壓記錄</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="theme-color" content="#e0ece9">
    <style>
        :root {
            --primary-color: #1a8c7d;
            --primary-gradient: linear-gradient(145deg, #2bb8a6, #14796c);
            --bg-color: #e0ece9;
            --card-bg: #e0ece9;
            --border-color: #c5ddd8;
            --text-dark: #1c3b36;
            --text-gray: #5f7a75;
            --input-bg: transparent;
            --table-header: #d6e6e2;
            --tr-even: #d9eae6;
            --card-shadow: 8px 8px 16px rgba(20, 50, 45, 0.2), -8px -8px 16px rgba(255, 255, 255, 0.9);
            --card-inset: inset 2px 2px 5px rgba(255,255,255,0.8), inset -2px -2px 5px rgba(20, 50, 45, 0.05);
            --btn-shadow: 6px 6px 12px rgba(20, 50, 45, 0.25), -6px -6px 12px rgba(255, 255, 255, 0.5);
            --btn-shadow-active: inset 4px 4px 8px rgba(0,0,0,0.3), inset -4px -4px 8px rgba(255,255,255,0.1);
            --input-shadow: inset 4px 4px 8px rgba(20, 50, 45, 0.2), inset -4px -4px 8px rgba(255, 255, 255, 0.9);
            --text-3d: 1px 1px 0px rgba(255,255,255,0.4), 2px 2px 2px rgba(20,50,45,0.2);
            --text-engrave: 1px 1px 1px rgba(0,0,0,0.3), inset 1px 1px 1px rgba(255,255,255,0.2);
        }
        body.purple {
            --primary-color: #ab47bc; --primary-gradient: linear-gradient(145deg, #ba68c8, #8e24aa);
            --bg-color: #f3e5f5; --card-bg: #f3e5f5; --border-color: #e1bee7;
            --text-dark: #4a148c; --text-gray: #8e24aa; --input-bg: transparent;
            --table-header: #ecd0f0; --tr-even: #eedcf2;
            --card-shadow: 8px 8px 16px rgba(74, 20, 140, 0.2), -8px -8px 16px rgba(255, 255, 255, 0.9);
            --btn-shadow: 6px 6px 12px rgba(74, 20, 140, 0.25), -6px -6px 12px rgba(255, 255, 255, 0.5);
            --input-shadow: inset 4px 4px 8px rgba(74, 20, 140, 0.2), inset -4px -4px 8px rgba(255, 255, 255, 0.9);
        }
        body.blue {
            --primary-color: #0288d1; --primary-gradient: linear-gradient(145deg, #039be5, #0277bd);
            --bg-color: #e1f5fe; --card-bg: #e1f5fe; --border-color: #b3e5fc;
            --text-dark: #01579b; --text-gray: #0288d1; --input-bg: transparent;
            --table-header: #cdeefc; --tr-even: #d4f1fc;
            --card-shadow: 8px 8px 16px rgba(1, 87, 155, 0.2), -8px -8px 16px rgba(255, 255, 255, 0.9);
            --btn-shadow: 6px 6px 12px rgba(1, 87, 155, 0.25), -6px -6px 12px rgba(255, 255, 255, 0.5);
            --input-shadow: inset 4px 4px 8px rgba(1, 87, 155, 0.2), inset -4px -4px 8px rgba(255, 255, 255, 0.9);
        }
        body.brown {
            --primary-color: #795548; --primary-gradient: linear-gradient(145deg, #8d6e63, #5d4037);
            --bg-color: #efebe9; --card-bg: #efebe9; --border-color: #d7ccc8;
            --text-dark: #3e2723; --text-gray: #795548; --input-bg: transparent;
            --table-header: #e2d9d5; --tr-even: #e8e0dc;
            --card-shadow: 8px 8px 16px rgba(62, 39, 35, 0.2), -8px -8px 16px rgba(255, 255, 255, 0.9);
            --btn-shadow: 6px 6px 12px rgba(62, 39, 35, 0.25), -6px -6px 12px rgba(255, 255, 255, 0.5);
            --input-shadow: inset 4px 4px 8px rgba(62, 39, 35, 0.2), inset -4px -4px 8px rgba(255, 255, 255, 0.9);
        }
        body.gray {
            --primary-color: #666666; --primary-gradient: linear-gradient(145deg, #888888, #444444);
            --bg-color: #f0f0f0; --card-bg: #f0f0f0; --border-color: #d0d0d0;
            --text-dark: #000000; --text-gray: #666666; --input-bg: transparent;
            --table-header: #e8e8e8; --tr-even: #f5f5f5;
            --card-shadow: 8px 8px 16px rgba(0, 0, 0, 0.15), -8px -8px 16px rgba(255, 255, 255, 0.9);
            --btn-shadow: 6px 6px 12px rgba(0, 0, 0, 0.2), -6px -6px 12px rgba(255, 255, 255, 0.5);
            --input-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.15), inset -4px -4px 8px rgba(255, 255, 255, 0.9);
        }
        body.iron-gray {
            --primary-color: #424242; --primary-gradient: linear-gradient(145deg, #616161, #212121);
            --bg-color: #f5f5f5; --card-bg: #f5f5f5; --border-color: #424242;
            --text-dark: #000000; --text-gray: #424242; --input-bg: transparent;
            --table-header: #e0e0e0; --tr-even: #f0f0f0;
            --card-shadow: 8px 8px 16px rgba(0, 0, 0, 0.3), -8px -8px 16px rgba(255, 255, 255, 0.9);
            --card-inset: inset 2px 2px 5px rgba(0,0,0,0.2), inset -2px -2px 5px rgba(255,255,255,0.1);
            --btn-shadow: 6px 6px 12px rgba(0, 0, 0, 0.3), -6px -6px 12px rgba(255, 255, 255, 0.5);
            --input-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.2), inset -4px -4px 8px rgba(255, 255, 255, 0.1);
        }
        
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang TC', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-dark); margin: 0; padding: 12px; 
            min-height: 100vh; transition: background-color 0.3s ease, color 0.3s ease; 
        }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        h2 { margin: 0; font-size: 26px; font-weight: 900; color: var(--primary-color); text-shadow: var(--text-3d); }
        .subtitle { color: var(--text-gray); margin-bottom: 16px; font-size: 16px; font-weight: 900; text-shadow: 1px 1px 0px rgba(255,255,255,0.6); }
        
        .card { 
            background: var(--card-bg); border-radius: 20px; padding: 16px; margin-bottom: 12px; 
            box-shadow: var(--card-shadow), var(--card-inset); border: 1px solid var(--border-color);
        }
        .card-title { 
            font-size: 18px; font-weight: 900; margin-bottom: 12px; padding-bottom: 8px; 
            border-bottom: 2px solid var(--border-color); color: var(--primary-color); 
            text-shadow: var(--text-3d); display: flex; justify-content: space-between; align-items: center;
        }
        .input-group { display: flex; gap: 12px; margin-bottom: 16px; }
        .input-group input { 
            flex: 1; width: 100%; padding: 14px 8px; border-radius: 14px; font-size: 18px; font-weight: bold;
            text-align: center; background: var(--input-bg); color: var(--text-dark); border: 1px solid var(--border-color); 
            box-shadow: var(--input-shadow); transition: all 0.3s;
        }
        .input-group input:focus { outline: none; border-color: var(--primary-color); box-shadow: var(--input-shadow), 0 0 0 2px rgba(26, 140, 125, 0.2); }
        .btn-group { display: flex; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
        button { 
            flex: 1; min-width: 100px; padding: 12px; border-radius: 12px; font-size: 16px; font-weight: 900; 
            cursor: pointer; border: 1px solid var(--primary-color); transition: 0.1s; color: var(--primary-color); text-shadow: var(--text-engrave);
            background: transparent; box-shadow: var(--btn-shadow);
        }
        .header-btn { flex: none; min-width: auto; padding: 10px 20px; background: var(--card-bg); color: var(--primary-color); border: 1px solid var(--border-color); box-shadow: var(--btn-shadow); text-shadow: none; border-radius: 10px; }
        .btn-primary { color: var(--primary-color); border: 1px solid var(--primary-color); }
        .btn-outline { color: var(--primary-color); border: 1px solid var(--primary-color); }
        .btn-danger { background: linear-gradient(145deg, #e74c3c, #c0392b); }
        .btn-backup { background: linear-gradient(145deg, #ffb74d, #f57c00); }
        button:active { transform: translateY(3px); box-shadow: var(--btn-shadow-active); }
        .hint-text { color: var(--primary-color); font-size: 13px; margin-bottom: 8px; font-weight: bold; text-shadow: 1px 1px 0px rgba(255,255,255,0.6); }
        .table-responsive { width: 100%; overflow-x: auto; border-radius: 16px; box-shadow: var(--card-inset); border: 1px solid var(--border-color); background: transparent; }
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 16px; background: transparent; color: var(--text-dark); min-width: 600px; }
        th, td { padding: 8px 4px; border-bottom: 1px solid var(--border-color); white-space: nowrap; }
        th { background-color: var(--table-header); font-weight: 900; color: var(--primary-color); text-shadow: var(--text-3d); border-bottom: 2px solid var(--border-color); }
        tr:nth-child(even) { background-color: var(--tr-even); }
        tr:last-child td { border-bottom: none; }
        .col-date { width: 100px; } 
        .col-action { width: 50px; } 
        .col-data { width: auto; }  
        .edit-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--primary-color); font-size: 16px; cursor: pointer; padding: 6px 10px; min-width: auto; flex: none; font-weight: bold; box-shadow: var(--btn-shadow); text-shadow: none; border-radius: 10px; transition: 0.1s; }
        .edit-btn:active { transform: translateY(2px); box-shadow: var(--btn-shadow-active); }
        .align-bottom { vertical-align: bottom !important; padding-bottom: 6px !important; }
        .group-header { padding-top: 6px !important; padding-bottom: 3px !important; }
        .sub-header th { padding-top: 3px !important; padding-bottom: 6px !important; border-bottom: 2px solid var(--border-color); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background: var(--card-bg); color: var(--text-dark); padding: 20px; border-radius: 20px; width: 90%; max-width: 350px; position: relative; box-shadow: var(--card-shadow), var(--card-inset); border: 1px solid var(--border-color); }
        .modal-close { float: right; font-size: 24px; font-weight: bold; color: var(--text-gray); cursor: pointer; }
        .theme-select { width: 100%; padding: 10px; border-radius: 12px; margin-bottom: 16px; background: transparent; color: var(--text-dark); border: 1px solid var(--border-color); font-size: 14px; font-weight: bold; box-shadow: var(--input-shadow); }
        .version-text { text-align: center; margin-top: 16px; font-size: 12px; color: var(--text-gray); font-weight: bold; }
        .modal-period-btns { display: flex; gap: 10px; margin-top: 16px; }
        .modal-period-btns button { flex: 1; padding: 12px; border-radius: 12px; font-size: 16px; font-weight: 900; cursor: pointer; border: none; color: white; text-shadow: var(--text-engrave); }
        .modal-btn-morning { background: linear-gradient(145deg, #fb8c00, #ef6c00); box-shadow: var(--btn-shadow); }
        .modal-btn-evening { background: linear-gradient(145deg, #2196f3, #1565c0); box-shadow: var(--btn-shadow); }
        .modal-period-btns button:active { transform: translateY(3px); box-shadow: var(--btn-shadow-active); }
        .toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; }
        .toast { background: var(--text-dark); color: var(--bg-color); padding: 12px 20px; border-radius: 24px; font-size: 14px; font-weight: bold; box-shadow: 0 6px 16px rgba(0,0,0,0.3); opacity: 0; transform: translateY(16px); animation: toastIn 0.3s forwards, toastOut 0.3s 2.5s forwards; pointer-events: auto; text-align: center; max-width: 80vw; }
        .toast.error { background: #d32f2f; color: white; }
        .toast.warning { background: #f57c00; color: white; }
        @keyframes toastIn { to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { to { opacity: 0; transform: translateY(-16px); } }
        .print-only { display: none; }
        @media print {
            @page { size: A4 portrait; margin: 12mm 16mm; }
            .no-print, .col-action { display: none !important; }
            .print-only { display: block !important; text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 4px; color: black; text-shadow: none !important; }
            body { background: white !important; color: black !important; margin: 0; padding: 0; }
            .card { border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; background: white !important; }
            .table-responsive { overflow: visible !important; border: none !important; box-shadow: none !important; }
            table { width: 100% !important; min-width: 100% !important; border-collapse: collapse !important; font-size: 9px !important; color: black !important; background: white !important; table-layout: auto !important; }
            th, td { border: 1px solid black !important; padding: 3px 4px !important; color: black !important; background: transparent !important; white-space: normal !important; line-height: 1.4 !important; text-shadow: none !important; }
            th { background-color: #f0f0f0 !important; font-weight: bold; }
            .col-date { width: auto !important; }
            .col-data { width: auto !important; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toast-container"></div>
    <div class="header-container no-print">
        <h2>血壓記錄</h2>
        <button class="header-btn" onclick="openTools()">進階</button>
    </div>
    <div class="subtitle no-print" id="current-time-display">今日：載入中... 時段：載入中...</div>
    <input type="file" id="import-file" accept=".json" style="display: none;">

    <div class="card no-print" id="input-card">
        <div class="card-title" id="input-card-title">新增 / 修改記錄</div>
        <div class="input-group">
            <input type="number" id="sys" placeholder="收縮壓" inputmode="numeric">
            <input type="number" id="dia" placeholder="舒張壓" inputmode="numeric">
            <input type="number" id="hr" placeholder="心率" inputmode="numeric">
        </div>
        <div class="btn-group">
            <button class="btn-primary" onclick="saveRecord()">儲存本時段</button>
            <button class="btn-outline" onclick="clearInputs()">取消修改</button>
            <button class="btn-danger" id="btn-delete" onclick="deleteCurrentRecord()" style="display: none;">刪除此筆</button>
        </div>
    </div>

    <div class="card" id="print-area">
        <div class="card-title no-print">血壓記錄查詢與輸出</div>
        <div class="print-only" id="print-title">血壓記錄表</div>
        <div class="hint-text no-print">💡 提示：點擊右側「✏️」可修改或補填早晚記錄。</div>
        <div class="input-group no-print">
            <input type="date" id="start-date" style="max-width: 45%; flex: 1; font-size: 16px;">
            <input type="date" id="end-date" style="max-width: 45%; flex: 1; font-size: 16px;">
        </div>
        <div class="btn-group no-print">
            <button class="btn-outline" onclick="renderTable()">開始查詢</button>
            <button class="btn-primary" onclick="printNative()">🖨️ 產出 PDF</button>
        </div>
        <div class="table-responsive">
            <table id="bp-table">
                <thead>
                    <tr>
                        <th rowspan="2" class="align-bottom col-date">日期</th>
                        <th colspan="3" class="group-header">早上記錄</th>
                        <th colspan="3" class="group-header">晚上記錄</th>
                        <th rowspan="2" class="align-bottom col-action no-print">修改</th>
                    </tr>
                    <tr class="sub-header">
                        <th class="col-data">收縮壓</th><th class="col-data">舒張壓</th><th class="col-data">心率</th>
                        <th class="col-data">收縮壓</th><th class="col-data">舒張壓</th><th class="col-data">心率</th>
                    </tr>
                </thead>
                <tbody id="record-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="toolsModal" class="modal-overlay no-print">
        <div class="modal-content">
            <span class="modal-close" onclick="closeTools()">&times;</span>
            <div class="card-title" style="margin-top: 5px;">🎨 佈景主題</div>
            <select id="theme-selector" class="theme-select" onchange="changeTheme()">
                <option value="light">淺色 (預設)</option>
                <option value="purple">紫色</option>
                <option value="blue">藍色</option>
                <option value="brown">棕色</option>
                <option value="gray">灰色</option>
                <option value="iron-gray">鐵灰高反差</option>
            </select>
            <div class="card-title" style="margin-top: 5px;">💾 資料備份與還原</div>
            <p style="font-size: 13px; color: var(--text-gray); margin-bottom: 12px; font-weight: bold;">更換手機前，請先匯出備份檔案。</p>
            <div class="btn-group" style="flex-direction: column; gap: 10px;">
                <button class="btn-backup" onclick="exportBackup()">📥 匯出最新備份</button>
                <button class="btn-outline" onclick="document.getElementById('import-file').click(); closeTools();">📂 匯入舊記錄檔案</button>
            </div>
            <div class="version-text">目前版本：V8.0 (精緻版)</div>
        </div>
    </div>

    <div id="periodModal" class="modal-overlay no-print">
        <div class="modal-content" style="text-align: center;">
            <span class="modal-close" onclick="closePeriodModal()">&times;</span>
            <div class="card-title" id="period-modal-title">選擇修改時段</div>
            <p style="color: var(--text-gray); font-size: 13px; margin-bottom: 8px;">請選擇您要修改的時段：</p>
            <div class="modal-period-btns">
                <button class="modal-btn-morning" onclick="confirmEdit('morning')">☀️ 早上</button>
                <button class="modal-btn-evening" onclick="confirmEdit('evening')">🌙 晚上</button>
            </div>
        </div>
    </div>

    <script>
        let appData = JSON.parse(localStorage.getItem('bpRecords')) || {};
        let editDate = null, editPeriod = null;
        let pendingEditDate = null;

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => { if (container.contains(toast)) container.removeChild(toast); }, 3000);
        }

        const themeColors = { 'light': '#e0ece9', 'purple': '#f3e5f5', 'blue': '#e1f5fe', 'brown': '#efebe9', 'gray': '#f0f0f0', 'iron-gray': '#f5f5f5' };
        function updateThemeMeta(theme) { 
            document.querySelector('meta[name="theme-color"]').setAttribute('content', themeColors[theme] || '#e0ece9'); 
        }
        function loadTheme() {
            let savedTheme = localStorage.getItem('bpTheme') || 'light';
            const allowedThemes = ['light', 'purple', 'blue', 'brown', 'gray', 'iron-gray'];
            if (!allowedThemes.includes(savedTheme)) savedTheme = 'light';
            document.body.className = savedTheme;
            document.getElementById('theme-selector').value = savedTheme;
            updateThemeMeta(savedTheme);
        }
        function changeTheme() {
            const theme = document.getElementById('theme-selector').value;
            document.body.className = theme;
            localStorage.setItem('bpTheme', theme);
            updateThemeMeta(theme);
        }

        function formatDate(date) { const y = date.getFullYear(); const m = String(date.getMonth() + 1).padStart(2, '0'); const d = String(date.getDate()).padStart(2, '0'); return `${y}-${m}-${d}`; }
        function getCurrentInfo() { const now = new Date(); const date = formatDate(now); const period = now.getHours() < 12 ? 'morning' : 'evening'; return { date, period, periodText: period === 'morning' ? '早上' : '晚上' }; }

        function init() {
            loadTheme();
            const info = getCurrentInfo();
            document.getElementById('current-time-display').innerText = `今日：${info.date} 時段：${info.periodText}`;
            const pastDate = new Date(); pastDate.setDate(pastDate.getDate() - 2);
            document.getElementById('start-date').value = formatDate(pastDate);
            document.getElementById('end-date').value = info.date;
            renderTable();
        }

        function clearInputs() {
            document.getElementById('sys').value = '';
            document.getElementById('dia').value = '';
            document.getElementById('hr').value = '';
            editDate = null; editPeriod = null;
            document.getElementById('input-card-title').innerText = '新增 / 修改記錄';
            document.getElementById('btn-delete').style.display = 'none';
        }

        function saveRecord() {
            const sys = parseInt(document.getElementById('sys').value, 10);
            const dia = parseInt(document.getElementById('dia').value, 10);
            const hr = parseInt(document.getElementById('hr').value, 10);

            if (isNaN(sys) && isNaN(dia) && isNaN(hr)) { showToast('請至少輸入一項數值！', 'error'); return; }
            if (!isNaN(sys) && !isNaN(dia) && sys <= dia) { showToast('錯誤：收縮壓必須大於舒張壓！', 'error'); return; }
            if ((sys && (sys < 60 || sys > 250)) || (dia && (dia < 40 || dia > 150)) || (hr && (hr < 30 || hr > 220))) { showToast('警告：數值超出正常生理範圍，仍會儲存。', 'warning'); }

            const info = getCurrentInfo();
            const targetDate = editDate || info.date;
            const targetPeriod = editPeriod || info.period;

            if (!appData[targetDate]) appData[targetDate] = { morning: {}, evening: {} };
            appData[targetDate][targetPeriod] = { sys: isNaN(sys) ? '' : String(sys), dia: isNaN(dia) ? '' : String(dia), hr: isNaN(hr) ? '' : String(hr) };
            localStorage.setItem('bpRecords', JSON.stringify(appData));
            showToast(`${targetDate} ${targetPeriod === 'morning' ? '早上' : '晚上'} 記錄已儲存！`);
            clearInputs();
            renderTable();
        }

        function deleteCurrentRecord() {
            if (!editDate || !editPeriod) return;
            if (confirm(`確定要刪除 ${editDate} 的${editPeriod === 'morning' ? '早上' : '晚上'}記錄嗎？`)) {
                appData[editDate][editPeriod] = { sys: '', dia: '', hr: '' };
                localStorage.setItem('bpRecords', JSON.stringify(appData));
                showToast('記錄已刪除');
                clearInputs();
                renderTable();
            }
        }

        function openTools() { document.getElementById('toolsModal').style.display = 'flex'; }
        function closeTools() { document.getElementById('toolsModal').style.display = 'none'; }

        function openPeriodModal(date) {
            pendingEditDate = date;
            document.getElementById('period-modal-title').innerText = `選擇修改時段 (${date})`;
            document.getElementById('periodModal').style.display = 'flex';
        }
        function closePeriodModal() { document.getElementById('periodModal').style.display = 'none'; }
        function confirmEdit(period) {
            closePeriodModal();
            editRecord(pendingEditDate, period);
        }

        function editRecord(date, period) {
            editDate = date; editPeriod = period;
            const record = appData[date]?.[period] || {};
            document.getElementById('sys').value = record.sys || '';
            document.getElementById('dia').value = record.dia || '';
            document.getElementById('hr').value = record.hr || '';
            document.getElementById('input-card-title').innerText = `修改模式：${date} (${period === 'morning' ? '早上' : '晚上'})`;
            document.getElementById('btn-delete').style.display = 'block';
            showToast(`已鎖定：${date} (${period === 'morning' ? '早上' : '晚上'})，請修改後按儲存`, 'warning');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function exportBackup() {
            if (Object.keys(appData).length === 0) { showToast('尚無資料可供備份', 'error'); return; }
            const url = URL.createObjectURL(new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' }));
            const a = document.createElement('a'); a.href = url; a.download = `血壓記錄_最新備份_${getCurrentInfo().date}.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            showToast('備份已下載至手機「下載」資料夾！'); closeTools();
        }

        document.getElementById('import-file').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const importedData = JSON.parse(event.target.result);
                    for (const date in importedData) {
                        if (!appData[date]) { appData[date] = importedData[date]; } 
                        else { for (const period in importedData[date]) { if (!appData[date][period] || !appData[date][period].sys) { appData[date][period] = importedData[date][period]; } } }
                    }
                    localStorage.setItem('bpRecords', JSON.stringify(appData));
                    showToast('舊記錄已完美合併還原！'); renderTable();
                } catch (error) { showToast('檔案讀取失敗，請確認格式', 'error'); }
                e.target.value = '';
            }; reader.readAsText(file);
        });

        function renderTable() {
            const tbody = document.getElementById('record-table-body');
            const startDateStr = document.getElementById('start-date').value;
            const endDateStr = document.getElementById('end-date').value;
            if (!startDateStr || !endDateStr) return;

            const fragment = document.createDocumentFragment();
            let currentDate = new Date(startDateStr);
            const endDate = new Date(endDateStr);

            while (currentDate <= endDate) {
                const date = formatDate(currentDate);
                const data = appData[date] || { morning: {}, evening: {} };
                const m = data.morning || {}; const e = data.evening || {};
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="col-date">${date}</td>
                    <td class="col-data">${m.sys || ''}</td><td class="col-data">${m.dia || ''}</td><td class="col-data">${m.hr || ''}</td>
                    <td class="col-data">${e.sys || ''}</td><td class="col-data">${e.dia || ''}</td><td class="col-data">${e.hr || ''}</td>
                    <td class="col-action no-print"><button class="edit-btn" onclick="openPeriodModal('${date}')">✏️</button></td>
                `;
                fragment.appendChild(tr);
                currentDate.setDate(currentDate.getDate() + 1);
            }
            tbody.innerHTML = '';
            tbody.appendChild(fragment);
        }

        function printNative() {
            const startDateStr = document.getElementById('start-date').value;
            const endDateStr = document.getElementById('end-date').value;
            if (!startDateStr || !endDateStr) { showToast('請先選擇匯出範圍', 'error'); return; }
            document.getElementById('print-title').innerText = `血壓記錄表\n(${startDateStr} 至 ${endDateStr})`;
            window.print();
        }

        init();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => { console.log('SW 註冊成功'); }).catch(err => { console.log('SW 註冊失敗:', err); });
            });
        }
    </script>
</body>
</html>
