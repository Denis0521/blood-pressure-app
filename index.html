<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>血壓記錄</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="theme-color" content="#e8f0ee">
    <style>
        :root {
            --primary-color: #1a8c7d;
            --primary-gradient: linear-gradient(135deg, #2aad9c, #14796c);
            --bg-color: #e8f0ee;
            --card-bg: rgba(255, 255, 255, 0.85);
            --border-color: #b8d4cf;
            --text-dark: #1c3b36;
            --text-gray: #5f7a75;
            --input-bg: rgba(249, 253, 252, 0.9);
            --table-header: rgba(230, 245, 241, 0.9);
            --tr-even: rgba(240, 248, 245, 0.7);
            --shadow-dark: rgba(20, 50, 45, 0.15);
            --shadow-light: rgba(255, 255, 255, 0.9);
            --inset-shadow: rgba(20, 50, 45, 0.1);
            --jade-glow: 0 0 15px rgba(42, 173, 156, 0.15);
        }
        body.theme-light-purple {
            --primary-color: #ab47bc; --primary-gradient: linear-gradient(135deg, #ba68c8, #8e24aa);
            --bg-color: #f3e5f5; --card-bg: rgba(255, 255, 255, 0.85); --border-color: #e1bee7;
            --text-dark: #4a148c; --text-gray: #8e24aa; --input-bg: rgba(253, 251, 253, 0.9);
            --table-header: rgba(243, 229, 245, 0.9); --tr-even: rgba(250, 248, 251, 0.7);
            --jade-glow: 0 0 15px rgba(171, 71, 188, 0.1);
        }
        body.theme-light-blue {
            --primary-color: #0288d1; --primary-gradient: linear-gradient(135deg, #039be5, #0277bd);
            --bg-color: #e1f5fe; --card-bg: rgba(255, 255, 255, 0.85); --border-color: #b3e5fc;
            --text-dark: #01579b; --text-gray: #0288d1; --input-bg: rgba(232, 244, 252, 0.9);
            --table-header: rgba(225, 245, 254, 0.9); --tr-even: rgba(241, 249, 255, 0.7);
            --jade-glow: 0 0 15px rgba(2, 136, 209, 0.1);
        }
        body.theme-light-orange {
            --primary-color: #f57c00; --primary-gradient: linear-gradient(135deg, #fb8c00, #ef6c00);
            --bg-color: #fff3e0; --card-bg: rgba(255, 255, 255, 0.85); --border-color: #ffe0b2;
            --text-dark: #e65100; --text-gray: #f57c00; --input-bg: rgba(253, 245, 234, 0.9);
            --table-header: rgba(255, 224, 178, 0.9); --tr-even: rgba(255, 248, 240, 0.7);
            --jade-glow: 0 0 15px rgba(245, 124, 0, 0.1);
        }
        body.theme-light-pink {
            --primary-color: #d81b60; --primary-gradient: linear-gradient(135deg, #ec407a, #c2185b);
            --bg-color: #fce4ec; --card-bg: rgba(255, 255, 255, 0.85); --border-color: #f8bbd0;
            --text-dark: #880e4f; --text-gray: #d81b60; --input-bg: rgba(253, 245, 248, 0.9);
            --table-header: rgba(252, 228, 236, 0.9); --tr-even: rgba(253, 240, 244, 0.7);
            --jade-glow: 0 0 15px rgba(216, 27, 96, 0.1);
        }
        body.theme-light-yellow {
            --primary-color: #f9a825; --primary-gradient: linear-gradient(135deg, #fbc02d, #f57f17);
            --bg-color: #fffde7; --card-bg: rgba(255, 255, 255, 0.85); --border-color: #fff9c4;
            --text-dark: #f57f17; --text-gray: #f9a825; --input-bg: rgba(253, 252, 240, 0.9);
            --table-header: rgba(255, 253, 231, 0.9); --tr-even: rgba(255, 254, 240, 0.7);
            --jade-glow: 0 0 15px rgba(249, 168, 37, 0.1);
        }
        
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang TC', sans-serif; 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.4), transparent 60%);
            color: var(--text-dark); margin: 0; padding: 12px; 
            min-height: 100vh; transition: background-color 0.3s ease, color 0.3s ease; 
        }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        h2 { margin: 0; font-size: 26px; font-weight: bold; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: var(--text-gray); margin-bottom: 20px; font-size: 16px; font-weight: bold; }
        
        /* 玉石卡片材質 */
        .card { 
            background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 20px; 
            box-shadow: 0 8px 32px var(--shadow-dark), var(--jade-glow), inset 0 1px 0 var(--shadow-light); 
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .card-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); color: var(--primary-color); display: flex; justify-content: space-between; align-items: center; }
        
        /* 時段選擇按鈕 (標題右側) */
        .period-selector { display: flex; gap: 8px; }
        .period-btn { padding: 6px 16px; border-radius: 20px; font-size: 18px; font-weight: 900; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .btn-morning { background: #fff3e0; color: #f57c00; border-color: #ffe0b2; }
        .btn-evening { background: #e3f2fd; color: #1976d2; border-color: #bbdefb; }
        .period-btn.active { transform: scale(1.05); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .btn-morning.active { background: #fb8c00; color: white; border-color: #f57c00; }
        .btn-evening.active { background: #1976d2; color: white; border-color: #1565c0; }

        .input-group { display: flex; gap: 12px; margin-bottom: 20px; }
        .input-group input { 
            flex: 1; width: 100%; padding: 14px 8px; border-radius: 10px; font-size: 18px; 
            text-align: center; background: var(--input-bg); color: var(--text-dark); border: 1px solid var(--border-color); 
            box-shadow: inset 0 2px 4px var(--inset-shadow); transition: all 0.3s;
        }
        .input-group input:focus { outline: none; border-color: var(--primary-color); box-shadow: inset 0 2px 4px var(--inset-shadow), 0 0 0 3px rgba(26, 140, 125, 0.2); }
        .btn-group { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        button { flex: 1; min-width: 120px; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        .header-btn { flex: none; min-width: auto; padding: 10px 20px; background: var(--card-bg); color: var(--primary-color); border: 1px solid var(--border-color); box-shadow: 0 4px 12px var(--shadow-dark); backdrop-filter: blur(6px); }
        .btn-primary { background: var(--primary-gradient); color: white; box-shadow: 0 4px 15px var(--shadow-dark); border: 1px solid rgba(255,255,255,0.1); }
        .btn-outline { background: var(--card-bg); color: var(--primary-color); border: 1px solid var(--primary-color); box-shadow: 0 4px 12px var(--shadow-dark); backdrop-filter: blur(6px); }
        .btn-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; box-shadow: 0 4px 15px var(--shadow-dark); }
        .btn-backup { background: linear-gradient(135deg, #ffb74d, #f57c00); color: white; box-shadow: 0 4px 15px var(--shadow-dark); }
        button:active { transform: translateY(2px); box-shadow: inset 0 2px 4px var(--inset-shadow); }
        .hint-text { color: var(--primary-color); font-size: 14px; margin-bottom: 12px; font-weight: bold; }
        
        .table-responsive { width: 100%; overflow-x: auto; border-radius: 12px; box-shadow: 0 4px 20px var(--shadow-dark); border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 15px; background: var(--card-bg); color: var(--text-dark); backdrop-filter: blur(6px); min-width: 600px; }
        th, td { padding: 10px 6px; border: 1px solid var(--border-color); white-space: nowrap; }
        th { background-color: var(--table-header); font-weight: 800; color: var(--primary-color); }
        tr:nth-child(even) { background-color: var(--tr-even); }
        tr:hover { background-color: rgba(26, 140, 125, 0.05); }
        
        .col-date { width: 110px; } 
        .col-action { width: 60px; } 
        .col-data { width: auto; }  
        
        .edit-btn { background: none; border: none; color: var(--primary-color); font-size: 20px; cursor: pointer; padding: 0; min-width: auto; flex: none; font-weight: bold; filter: drop-shadow(0 2px 2px var(--shadow-dark)); transition: 0.2s; }
        .edit-btn:active { transform: scale(0.9); }
        
        .align-bottom { vertical-align: bottom !important; padding-bottom: 8px !important; }
        .group-header { padding-top: 8px !important; padding-bottom: 4px !important; }
        .sub-header th { padding-top: 4px !important; padding-bottom: 8px !important; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); color: var(--text-dark); padding: 24px; border-radius: 16px; width: 90%; max-width: 350px; position: relative; box-shadow: 0 15px 40px var(--shadow-dark), var(--jade-glow); border: 1px solid var(--border-color); }
        .modal-close { float: right; font-size: 26px; font-weight: bold; color: var(--text-gray); cursor: pointer; }
        .theme-select { width: 100%; padding: 12px; border-radius: 10px; margin-bottom: 20px; background: var(--input-bg); color: var(--text-dark); border: 1px solid var(--border-color); font-size: 16px; box-shadow: inset 0 2px 4px var(--inset-shadow); }
        .version-text { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-gray); font-weight: bold; }
        
        .modal-period-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-period-btns button { flex: 1; padding: 14px; border-radius: 10px; font-size: 18px; font-weight: 900; cursor: pointer; border: none; color: white; }
        .modal-btn-morning { background: #fb8c00; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3); }
        .modal-btn-evening { background: #1976d2; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }
        
        .toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; }
        .toast { background: var(--text-dark); color: var(--bg-color); padding: 14px 24px; border-radius: 30px; font-size: 15px; font-weight: bold; box-shadow: 0 8px 20px rgba(0,0,0,0.3); opacity: 0; transform: translateY(20px); animation: toastIn 0.3s forwards, toastOut 0.3s 2.5s forwards; pointer-events: auto; text-align: center; max-width: 80vw; }
        .toast.error { background: #d32f2f; color: white; }
        .toast.warning { background: #f57c00; color: white; }
        @keyframes toastIn { to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { to { opacity: 0; transform: translateY(-20px); } }
        .print-only { display: none; }
        
        @media print {
            @page { size: A4 portrait; margin: 10mm; }
            .no-print, .col-action { display: none !important; }
            .print-only { display: block !important; text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 5px; color: black; }
            body { background: white !important; color: black !important; margin: 0; padding: 0; background-image: none !important; }
            .card { border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; backdrop-filter: none !important; background: white !important; }
            .table-responsive { overflow: visible !important; border: none !important; box-shadow: none !important; }
            table { width: 100% !important; min-width: 100% !important; border-collapse: collapse !important; font-size: 9px !important; color: black !important; background: white !important; backdrop-filter: none !important; }
            th, td { border: 1px solid black !important; padding: 2px 3px !important; color: black !important; background: transparent !important; white-space: normal !important; }
            th { background-color: #f0f0f0 !important; font-weight: bold; }
            .col-date { width: auto !important; }
            .col-data { width: 14.28% !important; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toast-container"></div>
    <div class="header-container no-print">
        <h2>血壓記錄</h2>
        <button class="header-btn" onclick="openTools()">進階</button>
    </div>
    <div class="subtitle no-print" id="current-time-display">今日：載入中... 時段：載入中...</div>
    <input type="file" id="import-file" accept=".json" style="display: none;">

    <div class="card no-print" id="input-card">
        <div class="card-title">
            <span id="input-card-title">新增 / 修改記錄</span>
            <div class="period-selector">
                <button class="period-btn btn-morning" id="btn-morning" onclick="setPeriod('morning')">早上</button>
                <button class="period-btn btn-evening" id="btn-evening" onclick="setPeriod('evening')">晚上</button>
            </div>
        </div>
        <div class="input-group">
            <input type="number" id="sys" placeholder="收縮壓" inputmode="numeric">
            <input type="number" id="dia" placeholder="舒張壓" inputmode="numeric">
            <input type="number" id="hr" placeholder="心率" inputmode="numeric">
        </div>
        <div class="btn-group">
            <button class="btn-primary" onclick="saveRecord()">儲存本時段</button>
            <button class="btn-outline" onclick="clearInputs()">取消修改</button>
            <button class="btn-danger" id="btn-delete" onclick="deleteCurrentRecord()" style="display: none;">刪除此筆</button>
        </div>
    </div>

    <div class="card" id="print-area">
        <div class="card-title no-print">血壓記錄查詢與輸出</div>
        <div class="print-only" id="print-title">血壓記錄表</div>
        <div class="hint-text no-print">💡 提示：點擊右側「✏️」可修改或補填早晚記錄。</div>
        <div class="input-group no-print">
            <input type="date" id="start-date">
            <input type="date" id="end-date">
        </div>
        <div class="btn-group no-print">
            <button class="btn-outline" onclick="renderTable()">開始查詢</button>
            <button class="btn-primary" onclick="printNative()">🖨️ 產出 PDF</button>
        </div>
        <div class="table-responsive">
            <table id="bp-table">
                <thead>
                    <tr>
                        <th rowspan="2" class="align-bottom col-date">日期</th>
                        <th colspan="3" class="group-header">早上記錄</th>
                        <th colspan="3" class="group-header">晚上記錄</th>
                        <th rowspan="2" class="align-bottom col-action no-print">修改</th>
                    </tr>
                    <tr class="sub-header">
                        <th class="col-data">收縮壓</th><th class="col-data">舒張壓</th><th class="col-data">心率</th>
                        <th class="col-data">收縮壓</th><th class="col-data">舒張壓</th><th class="col-data">心率</th>
                    </tr>
                </thead>
                <tbody id="record-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="toolsModal" class="modal-overlay no-print">
        <div class="modal-content">
            <span class="modal-close" onclick="closeTools()">&times;</span>
            <div class="card-title" style="margin-top: 5px;">🎨 佈景主題</div>
            <select id="theme-selector" class="theme-select" onchange="changeTheme()">
                <option value="light">淺色 (預設)</option>
                <option value="light-purple">淺紫色</option>
                <option value="light-blue">淺藍色</option>
                <option value="light-orange">淺橙色</option>
                <option value="light-pink">淺粉色</option>
                <option value="light-yellow">淺黃色</option>
            </select>
            <div class="card-title" style="margin-top: 5px;">💾 資料備份與還原</div>
            <p style="font-size: 14px; color: var(--text-gray); margin-bottom: 15px; font-weight: bold;">更換手機前，請先匯出備份檔案。</p>
            <div class="btn-group" style="flex-direction: column; gap: 12px;">
                <button class="btn-backup" onclick="exportBackup()">📥 匯出最新備份 (.json)</button>
                <button class="btn-outline" onclick="document.getElementById('import-file').click(); closeTools();">📂 匯入舊記錄檔案</button>
            </div>
            <div class="version-text">目前版本：V8.0 (極簡體驗版)</div>
        </div>
    </div>

    <div id="periodModal" class="modal-overlay no-print">
        <div class="modal-content" style="text-align: center;">
            <span class="modal-close" onclick="closePeriodModal()">&times;</span>
            <div class="card-title" id="period-modal-title">選擇修改時段</div>
            <p style="color: var(--text-gray); font-size: 14px; margin-bottom: 10px;">請選擇您要修改的時段：</p>
            <div class="modal-period-btns">
                <button class="modal-btn-morning" onclick="confirmEdit('morning')">☀️ 早上</button>
                <button class="modal-btn-evening" onclick="confirmEdit('evening')">🌙 晚上</button>
            </div>
        </div>
    </div>

    <script>
        let appData = JSON.parse(localStorage.getItem('bpRecords')) || {};
        let editDate = null, editPeriod = null;
        let pendingEditDate = null;

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => { if (container.contains(toast)) container.removeChild(toast); }, 3000);
        }

        const themeColors = { 'light': '#e8f0ee', 'light-purple': '#f3e5f5', 'light-blue': '#e1f5fe', 'light-orange': '#fff3e0', 'light-pink': '#fce4ec', 'light-yellow': '#fffde7' };
        function updateThemeMeta(theme) { document.querySelector('meta[name="theme-color"]').setAttribute('content', themeColors[theme] || '#e8f0ee'); }
        function loadTheme() {
            let savedTheme = localStorage.getItem('bpTheme') || 'light';
            const allowedThemes = ['light', 'light-purple', 'light-blue', 'light-orange', 'light-pink', 'light-yellow'];
            if (!allowedThemes.includes(savedTheme)) savedTheme = 'light';
            document.body.className = `theme-${savedTheme}`;
            document.getElementById('theme-selector').value = savedTheme;
            updateThemeMeta(savedTheme);
        }
        function changeTheme() {
            const theme = document.getElementById('theme-selector').value;
            document.body.className = `theme-${theme}`;
            localStorage.setItem('bpTheme', theme);
            updateThemeMeta(theme);
        }

        function formatDate(date) { const y = date.getFullYear(); const m = String(date.getMonth() + 1).padStart(2, '0'); const d = String(date.getDate()).padStart(2, '0'); return `${y}-${m}-${d}`; }
        function getCurrentInfo() { const now = new Date(); const date = formatDate(now); const period = now.getHours() < 12 ? 'morning' : 'evening'; return { date, period, periodText: period === 'morning' ? '早上' : '晚上' }; }

        function updatePeriodUI() {
            const mBtn = document.getElementById('btn-morning');
            const eBtn = document.getElementById('btn-evening');
            mBtn.classList.toggle('active', editPeriod === 'morning');
            eBtn.classList.toggle('active', editPeriod === 'evening');
        }

        function setPeriod(period) {
            editPeriod = period;
            updatePeriodUI();
        }

        function init() {
            loadTheme();
            const info = getCurrentInfo();
            document.getElementById('current-time-display').innerText = `今日：${info.date} 時段：${info.periodText}`;
            editPeriod = info.period;
            updatePeriodUI();
            
            const pastDate = new Date(); pastDate.setDate(pastDate.getDate() - 2);
            document.getElementById('start-date').value = formatDate(pastDate);
            document.getElementById('end-date').value = info.date;
            renderTable();
        }

        function clearInputs() {
            document.getElementById('sys').value = '';
            document.getElementById('dia').value = '';
            document.getElementById('hr').value = '';
            editDate = null;
            const info = getCurrentInfo();
            editPeriod = info.period; // 恢復為當前時段
            updatePeriodUI();
            document.getElementById('input-card-title').innerText = '新增 / 修改記錄';
            document.getElementById('btn-delete').style.display = 'none';
        }

        function saveRecord() {
            const sys = parseInt(document.getElementById('sys').value, 10);
            const dia = parseInt(document.getElementById('dia').value, 10);
            const hr = parseInt(document.getElementById('hr').value, 10);

            if (isNaN(sys) && isNaN(dia) && isNaN(hr)) { showToast('請至少輸入一項數值！', 'error'); return; }
            if (!isNaN(sys) && !isNaN(dia) && sys <= dia) { showToast('錯誤：收縮壓必須大於舒張壓！', 'error'); return; }
            if ((sys && (sys < 60 || sys > 250)) || (dia && (dia < 40 || dia > 150)) || (hr && (hr < 30 || hr > 220))) { showToast('警告：數值超出正常生理範圍，仍會儲存。', 'warning'); }

            if (!editPeriod) { showToast('請先選擇早上或晚上時段！', 'error'); return; }

            const info = getCurrentInfo();
            const targetDate = editDate || info.date;
            const targetPeriod = editPeriod;

            if (!appData[targetDate]) appData[targetDate] = { morning: {}, evening: {} };
            appData[targetDate][targetPeriod] = { sys: isNaN(sys) ? '' : String(sys), dia: isNaN(dia) ? '' : String(dia), hr: isNaN(hr) ? '' : String(hr) };
            localStorage.setItem('bpRecords', JSON.stringify(appData));
            showToast(`${targetDate} ${targetPeriod === 'morning' ? '早上' : '晚上'} 記錄已儲存！`);
            clearInputs();
            renderTable();
        }

        function deleteCurrentRecord() {
            if (!editDate || !editPeriod) return;
            if (confirm(`確定要刪除 ${editDate} 的${editPeriod === 'morning' ? '早上' : '晚上'}記錄嗎？`)) {
                appData[editDate][editPeriod] = { sys: '', dia: '', hr: '' };
                localStorage.setItem('bpRecords', JSON.stringify(appData));
                showToast('記錄已刪除');
                clearInputs();
                renderTable();
            }
        }

        function openTools() { document.getElementById('toolsModal').style.display = 'flex'; }
        function closeTools() { document.getElementById('toolsModal').style.display = 'none'; }

        function openPeriodModal(date) {
            pendingEditDate = date;
            document.getElementById('period-modal-title').innerText = `選擇修改時段 (${date})`;
            document.getElementById('periodModal').style.display = 'flex';
        }
        function closePeriodModal() { document.getElementById('periodModal').style.display = 'none'; }
        function confirmEdit(period) {
            closePeriodModal();
            editRecord(pendingEditDate, period);
        }

        function editRecord(date, period) {
            editDate = date; editPeriod = period;
            updatePeriodUI();
            const record = appData[date]?.[period] || {};
            document.getElementById('sys').value = record.sys || '';
            document.getElementById('dia').value = record.dia || '';
            document.getElementById('hr').value = record.hr || '';
            document.getElementById('input-card-title').innerText = `修改模式：${date}`;
            document.getElementById('btn-delete').style.display = 'block';
            showToast(`已鎖定：${date} (${period === 'morning' ? '早上' : '晚上'})，請修改後按儲存`, 'warning');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function exportBackup() {
            if (Object.keys(appData).length === 0) { showToast('尚無資料可供備份', 'error'); return; }
            const url = URL.createObjectURL(new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' }));
            const a = document.createElement('a'); a.href = url; a.download = `血壓記錄_最新備份_${getCurrentInfo().date}.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            showToast('備份已下載至手機「下載」資料夾！'); closeTools();
        }

        document.getElementById('import-file').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const importedData = JSON.parse(event.target.result);
                    for (const date in importedData) {
                        if (!appData[date]) { appData[date] = importedData[date]; } 
                        else { for (const period in importedData[date]) { if (!appData[date][period] || !appData[date][period].sys) { appData[date][period] = importedData[date][period]; } } }
                    }
                    localStorage.setItem('bpRecords', JSON.stringify(appData));
                    showToast('舊記錄已完美合併還原！'); renderTable();
                } catch (error) { showToast('檔案讀取失敗，請確認格式', 'error'); }
                e.target.value = '';
            }; reader.readAsText(file);
        });

        function renderTable() {
            const tbody = document.getElementById('record-table-body');
            const startDateStr = document.getElementById('start-date').value;
            const endDateStr = document.getElementById('end-date').value;
            if (!startDateStr || !endDateStr) return;

            const fragment = document.createDocumentFragment();
            let currentDate = new Date(startDateStr);
            const endDate = new Date(endDateStr);

            while (currentDate <= endDate) {
                const date = formatDate(currentDate);
                const data = appData[date] || { morning: {}, evening: {} };
                const m = data.morning || {}; const e = data.evening || {};
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="col-date">${date}</td>
                    <td class="col-data">${m.sys || ''}</td><td class="col-data">${m.dia || ''}</td><td class="col-data">${m.hr || ''}</td>
                    <td class="col-data">${e.sys || ''}</td><td class="col-data">${e.dia || ''}</td><td class="col-data">${e.hr || ''}</td>
                    <td class="col-action no-print"><button class="edit-btn" onclick="openPeriodModal('${date}')">✏️</button></td>
                `;
                fragment.appendChild(tr);
                currentDate.setDate(currentDate.getDate() + 1);
            }
            tbody.innerHTML = '';
            tbody.appendChild(fragment);
        }

        function printNative() {
            const startDateStr = document.getElementById('start-date').value;
            const endDateStr = document.getElementById('end-date').value;
            if (!startDateStr || !endDateStr) { showToast('請先選擇匯出範圍', 'error'); return; }
            document.getElementById('print-title').innerText = `血壓記錄表\n(${startDateStr} 至 ${endDateStr})`;
            window.print();
        }

        init();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => { console.log('SW 註冊成功'); }).catch(err => { console.log('SW 註冊失敗:', err); });
            });
        }
    </script>
</body>
</html>
